<svg class="stage__svg" viewBox="0 0 1200 500" role="img"
             aria-labelledby="truck-title truck-desc">
          <title id="truck-title">Pink Cybertruck, side profile</title>
          <desc id="truck-desc">A Cybertruck in the currently selected paint color, shown from the side with its faceted stainless-steel exoskeleton, wedge roofline and angular wheel arches.</desc>

          <defs>
            <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="var(--paint-hi)"/>
              <stop offset="55%" stop-color="var(--paint-mid)"/>
              <stop offset="100%" stop-color="var(--paint-lo)"/>
            </linearGradient>
            <linearGradient id="gRoof" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="var(--paint-hi)"/>
              <stop offset="100%" stop-color="var(--paint-mid)"/>
            </linearGradient>
            <linearGradient id="gBed" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="var(--paint-mid)"/>
              <stop offset="100%" stop-color="var(--paint-lo)"/>
            </linearGradient>
            <linearGradient id="gGlass" x1="0.1" y1="0" x2="0.9" y2="1">
              <stop offset="0%"   stop-color="#3A4048"/>
              <stop offset="45%"  stop-color="#171A20"/>
              <stop offset="100%" stop-color="#0B0D10"/>
            </linearGradient>
            <linearGradient id="gLight" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stop-color="var(--paint-hi)"/>
              <stop offset="100%" stop-color="#FFFFFF"/>
            </linearGradient>
            <radialGradient id="gShadow" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%"   stop-color="#000" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <ellipse cx="600" cy="440" rx="470" ry="24" fill="url(#gShadow)"/>

          <!-- Body. Upper edge is one unbroken line: bumper → windshield base → apex.
               Lower edge is the sill. Everything between is one stainless plane. -->
          <polygon class="paint-body" fill="url(#gBody)"
                   points="45,252 348,146 366,208 784,208 800,150 1155,208 1155,362 45,362"/>

          <!-- Roof + bed cover: the second plane, catching the sky -->
          <polygon class="paint-roof" fill="url(#gRoof)"
                   points="348,146 470,80 1155,208 800,150"/>

          <!-- Bed flank, one stop darker so the cab reads as a separate volume -->
          <polygon class="paint-panel" fill="url(#gBed)" points="812,190 1155,212 1155,362 812,362"/>

          <!-- Armor glass -->
          <polygon fill="url(#gGlass)" points="360,150 470,88 790,155 776,206 372,206"/>
          <!-- B pillar -->
          <polygon fill="#0B0D10" points="565,108 580,111 580,206 565,206"/>

          <!-- Panel seams — the exoskeleton's fold lines -->
          <g stroke="#000" stroke-opacity="0.28" stroke-width="1.5">
            <line x1="366" y1="208" x2="366" y2="362"/>
            <line x1="580" y1="208" x2="580" y2="362"/>
            <line x1="784" y1="208" x2="784" y2="362"/>
            <line x1="812" y1="190" x2="812" y2="362"/>
          </g>
          <!-- Light catching the two folds -->
          <line x1="45" y1="252" x2="470" y2="80" stroke="var(--paint-hi)" stroke-width="2.5" stroke-opacity="0.85"/>
          <line x1="470" y1="80" x2="1155" y2="208" stroke="var(--paint-hi)" stroke-width="2.5" stroke-opacity="0.7"/>

          <!-- Rocker cladding, inset between the arches -->
          <polygon fill="#15181D" points="60,340 1140,340 1140,362 60,362"/>
          <!-- Light bars -->
          <rect x="45" y="246" width="22" height="6" fill="url(#gLight)"/>
          <rect x="1108" y="216" width="47" height="7" rx="1" fill="#E23B4B"/>

          <!-- Wheel arches: trapezoids. The Cybertruck has no round corners. -->
          <polygon fill="#0F1216" points="162,362 192,268 308,268 338,362"/>
          <polygon fill="#0F1216" points="862,362 892,268 1008,268 1038,362"/>

          <!-- Wheels. Kept light enough to hold their edge against a near-black page. -->
          <g>
            <circle cx="250" cy="354" r="78" fill="#2A2F37"/>
            <circle cx="250" cy="354" r="78" fill="none" stroke="#4A515C" stroke-width="1.5"/>
            <circle cx="250" cy="354" r="51" fill="#151920"/>
            <circle cx="250" cy="354" r="51" fill="none" stroke="#565E6A" stroke-width="2"/>
            <g fill="#3D4450">
              <polygon points="250,309 263,330 237,330"/>
              <polygon points="250,399 237,378 263,378"/>
              <polygon points="205,354 226,341 226,367"/>
              <polygon points="295,354 274,367 274,341"/>
            </g>
            <circle cx="250" cy="354" r="16" fill="#0B0D10" stroke="#565E6A" stroke-width="1.5"/>
          </g>
          <g>
            <circle cx="950" cy="354" r="78" fill="#2A2F37"/>
            <circle cx="950" cy="354" r="78" fill="none" stroke="#4A515C" stroke-width="1.5"/>
            <circle cx="950" cy="354" r="51" fill="#151920"/>
            <circle cx="950" cy="354" r="51" fill="none" stroke="#565E6A" stroke-width="2"/>
            <g fill="#3D4450">
              <polygon points="950,309 963,330 937,330"/>
              <polygon points="950,399 937,378 963,378"/>
              <polygon points="905,354 926,341 926,367"/>
              <polygon points="995,354 974,367 974,341"/>
            </g>
            <circle cx="950" cy="354" r="16" fill="#0B0D10" stroke="#565E6A" stroke-width="1.5"/>
          </g>
        </svg>